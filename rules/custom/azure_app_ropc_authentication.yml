title: Applications That Are Using ROPC Authentication Flow
id: 55695bc0-c8cf-461f-a379-2535f563c854
status: test
description: |
    Resource owner password credentials (ROPC) should be avoided if at all possible as this requires the user to expose their current password credentials to the application directly.
    The application then uses those credentials to authenticate the user against the identity provider.
    level: medium — ROPC is a legitimate, still-supported auth flow (often used deliberately by legacy
    apps or automated testing, per falsepositives below), so a single hit is a policy/hygiene signal
    rather than proof of compromise; it's not "low" because ROPC bypasses MFA and phishing-resistant
    auth, and it's a known technique in password-spray and credential-stuffing follow-on activity
    (T1078), so it still warrants review rather than being ignored outright.
references:
    - https://learn.microsoft.com/en-us/entra/architecture/security-operations-applications#application-authentication-flows
    - |
      Test evidence: Hayabusa/scan_evtx only parses Windows .evtx and this rule's logsource is Azure AD
      sign-in logs (product: azure, service: signinlogs), so it cannot be run through this repo's
      scan_evtx tooling, and sample_evtx/ has no Azure log samples. Manually verified instead against the
      synthetic fixture rules/custom/tests/azure_app_ropc_authentication.json (a minimal sign-in-log-shaped
      record with properties.message set to "ROPC") — selection matches, condition holds, expected match:
      medium. Documented as manual verification, not a hayabusa-run test.
author: Mark Morowczynski '@markmorow', Bailey Bercik '@baileybercik'
date: 2022-06-01
tags:
    - attack.t1078
    - attack.defense-evasion
    - attack.persistence
    - attack.privilege-escalation
    - attack.initial-access
logsource:
    product: azure
    service: signinlogs
detection:
    selection:
        properties.message: ROPC
    condition: selection
falsepositives:
    - Applications that are being used as part of automated testing or a legacy application that cannot use any other modern authentication flow
level: medium
